<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b0b0d; color: #ececf1; }
        .user-bubble { background: #2b2d31; border-radius: 15px 15px 2px 15px; }
        .ai-bubble { background: #1e1f20; border: 1px solid #333; border-radius: 15px 15px 15px 2px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <header class="p-4 border-b border-white/10 flex justify-between items-center bg-[#0b0b0d]">
        <h1 class="font-bold text-lg">Gemini <span class="text-blue-500">AI</span></h1>
        <button onclick="clearChat()" class="text-[10px] text-gray-500">مسح السجل</button>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-24 space-y-6"></main>

    <footer class="p-4">
        <div class="max-w-4xl mx-auto relative">
            <div id="status" class="hidden absolute -top-7 right-2 text-[10px] text-blue-400 animate-pulse">جاري التفكير...</div>
            <div class="flex items-center px-4 py-1 bg-[#1e1f20] border border-[#444] rounded-2xl">
                <input type="text" id="userInput" placeholder="اسأل أي شيء..." class="flex-1 bg-transparent border-none outline-none py-3 text-sm text-white">
                <button onclick="handleSend()" class="p-2 bg-blue-600 rounded-xl hover:bg-blue-500 active:scale-95 transition-all">
                    <svg class="w-5 h-5 text-white transform rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const API_KEY = "AIzaSyC4g9Kq2qp8XT_VWN4M4CPA5HflujK80pI";
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const statusInd = document.getElementById('status');

        let chatHistory = JSON.parse(localStorage.getItem('gemini_history')) || [];
        if(chatHistory.length > 0) renderChat();

        async function handleSend() {
            const text = userInput.value.trim();
            if(!text) return;

            addMsg('user', text);
            userInput.value = '';
            statusInd.classList.remove('hidden');

            // محاولة إرسال الطلب لمسارات مختلفة لضمان العمل
            const endpoints = [
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
                `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`
            ];

            let success = false;
            for (let url of endpoints) {
                if (success) break;
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                    });
                    const data = await response.json();
                    
                    if(!data.error) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        addMsg('model', aiText);
                        save(text, aiText);
                        success = true;
                    }
                } catch (e) { console.log("Trial failed for: " + url); }
            }

            if (!success) {
                addMsg('model', "تعذر الاتصال بـ Gemini. قد يكون السبب قيوداً جغرافية على مفتاحك أو أن المفتاح يحتاج لتفعيل Billing (حتى لو مجاني).");
            }
            statusInd.classList.add('hidden');
        }

        function addMsg(role, content) {
            const isUser = role === 'user';
            const html = `<div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster"><div class="max-w-[85%] p-3.5 ${isUser ? 'user-bubble' : 'ai-bubble'}"><p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p></div></div>`;
            chatBox.insertAdjacentHTML('beforeend', html);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function save(u, a) {
            chatHistory.push({ u, a });
            localStorage.setItem('gemini_history', JSON.stringify(chatHistory));
        }

        function renderChat() {
            chatHistory.forEach(m => { addMsg('user', m.u); addMsg('model', m.a); });
        }

        function clearChat() { localStorage.clear(); location.reload(); }
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
