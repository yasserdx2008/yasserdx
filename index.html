<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gemini AI - يعمل 100%</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .fullscreen-chat {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background: rgba(15, 19, 29, 0.95);
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-header h2 {
            color: #ea4335;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .new-chat-btn {
            background: #ea4335;
            border: none;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .conversations-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .convo-item {
            background: rgba(30, 36, 50, 0.6);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .convo-item:hover {
            background: rgba(234,67,53,0.2);
        }

        .convo-item.active {
            background: linear-gradient(95deg, #2a1e3a, #1a0f2a);
            border-right: 3px solid #ea4335;
        }

        .convo-title {
            font-size: 0.85rem;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .convo-date {
            font-size: 0.6rem;
            color: #7e8aa2;
            margin-top: 5px;
            display: flex;
            justify-content: space-between;
        }

        .delete-convo {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(10, 14, 23, 0.9);
        }

        .chat-header {
            padding: 1rem 2rem;
            background: rgba(15, 19, 29, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ea4335, #fbbc04);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 1.3rem;
            color: #e2e8f0;
        }

        .key-status {
            background: rgba(76,175,80,0.2);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #81c784;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: slideUp 0.3s ease;
            max-width: 80%;
        }

        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .user-message .avatar {
            background: linear-gradient(145deg, #ea4335, #c5221f);
        }

        .bubble {
            background: rgba(30, 36, 50, 0.9);
            padding: 12px 18px;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            color: #f1f5f9;
            line-height: 1.5;
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #ea4335, #c5221f);
            border-bottom-right-radius: 6px;
            border-bottom-left-radius: 20px;
        }

        .typing-indicator {
            display: flex;
            gap: 8px;
            background: rgba(30, 36, 50, 0.8);
            padding: 12px 20px;
            border-radius: 30px;
            width: fit-content;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            animation: wave 1.2s infinite;
        }

        .input-area {
            padding: 1.2rem 2rem 1.8rem;
            background: rgba(10, 14, 23, 0.95);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 8px 8px 8px 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            resize: none;
            outline: none;
            padding: 12px 0;
        }

        .send-btn {
            background: #ea4335;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .menu-toggle {
            display: none;
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ea4335;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            z-index: 20;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px);}
            to { opacity: 1; transform: translateY(0);}
        }

        @keyframes wave {
            0%,100%{ transform: translateY(0);}
            50%{ transform: translateY(-5px);}
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                right: -300px;
                top: 0;
                height: 100%;
                width: 280px;
                z-index: 30;
            }
            .sidebar.open {
                right: 0;
            }
            .menu-toggle {
                display: block;
            }
            .message {
                max-width: 95%;
            }
            .messages-area {
                padding: 1rem;
            }
            .input-area {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    
    <div class="fullscreen-chat">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fab fa-google"></i> Gemini AI</h2>
                <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus"></i> محادثة جديدة</button>
            </div>
            <div class="conversations-list" id="conversationsList"></div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="logo-area">
                    <i class="fab fa-google logo-icon"></i>
                    <h1>Gemini 1.5 Flash</h1>
                </div>
                <div class="key-status">
                    <i class="fas fa-check-circle"></i> API يعمل | محلي
                </div>
            </div>
            <div class="messages-area" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" rows="1" placeholder="اكتب رسالتك..."></textarea>
                    <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ====================== مفتاح API ======================
        const GEMINI_API_KEY = "AIzaSyAM1ODjmbxLL2jFk0PT2ryKx5N6YmasApc";
        
        // استخدام النموذج gemini-1.5-flash (أسرع وأكثر توافقاً مع المفاتيح المجانية)
        const MODEL = "gemini-1.5-flash";
        
        // ====================== المحادثات ======================
        let conversations = [];
        let currentId = null;
        let isLoading = false;
        
        function saveChats() {
            localStorage.setItem('gemini_chats_final_working', JSON.stringify(conversations));
        }
        
        function loadChats() {
            const stored = localStorage.getItem('gemini_chats_final_working');
            if (stored) {
                try {
                    conversations = JSON.parse(stored);
                } catch(e) {}
            }
            if (!conversations.length) {
                conversations = [{
                    id: Date.now().toString(),
                    title: "المحادثة الأولى",
                    date: new Date().toLocaleString(),
                    messages: [{ role: "model", content: "🌟 مرحباً! أنا Gemini 1.5 Flash - يعمل مباشرة!\n\n✅ المفتاح مضمن ويعمل\n💾 محادثاتك تحفظ تلقائياً\n🎯 اسألني أي شيء!" }]
                }];
                saveChats();
            }
            currentId = conversations[0].id;
            renderSidebar();
            loadCurrentChat();
        }
        
        function renderSidebar() {
            const listDiv = document.getElementById('conversationsList');
            listDiv.innerHTML = '';
            conversations.forEach(conv => {
                const div = document.createElement('div');
                div.className = `convo-item ${currentId === conv.id ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="convo-title"><i class="fas fa-comment"></i> ${conv.title.substring(0, 25)}</div>
                    <div class="convo-date">
                        <span>${new Date(conv.date).toLocaleDateString()}</span>
                        <button class="delete-convo" data-id="${conv.id}"><i class="fas fa-trash-alt"></i></button>
                    </div>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-convo') || e.target.closest('.delete-convo')) return;
                    switchChat(conv.id);
                });
                const delBtn = div.querySelector('.delete-convo');
                if (delBtn) delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(conv.id);
                });
                listDiv.appendChild(div);
            });
        }
        
        function switchChat(id) {
            currentId = id;
            renderSidebar();
            loadCurrentChat();
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }
        
        function loadCurrentChat() {
            const conv = conversations.find(c => c.id === currentId);
            if (!conv) return;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            conv.messages.forEach(msg => {
                renderMessage(msg.content, msg.role === 'user');
            });
            scrollToBottom();
        }
        
        function renderMessage(content, isUser) {
            const container = document.getElementById('messagesContainer');
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : ''}`;
            div.innerHTML = `
                <div class="avatar">${isUser ? '<i class="fas fa-user"></i>' : '<i class="fab fa-google"></i>'}</div>
                <div class="bubble">${escapeHtml(content).replace(/\n/g, '<br>')}</div>
            `;
            container.appendChild(div);
        }
        
        function addMessage(role, content) {
            const conv = conversations.find(c => c.id === currentId);
            if (conv) {
                conv.messages.push({ role, content });
                conv.date = new Date().toLocaleString();
                if (role === 'user' && conv.title === "المحادثة الأولى" && content.length > 0) {
                    conv.title = content.length > 20 ? content.substring(0, 18) + '...' : content;
                }
                saveChats();
                renderSidebar();
                renderMessage(content, role === 'user');
                scrollToBottom();
            }
        }
        
        function newChat() {
            const newId = Date.now().toString();
            conversations.unshift({
                id: newId,
                title: "محادثة جديدة",
                date: new Date().toLocaleString(),
                messages: [{ role: "model", content: "✨ محادثة جديدة! اسألني ما شئت." }]
            });
            saveChats();
            currentId = newId;
            renderSidebar();
            loadCurrentChat();
        }
        
        function deleteChat(id) {
            if (conversations.length <= 1) {
                alert("⚠️ لا يمكن حذف المحادثة الوحيدة");
                return;
            }
            conversations = conversations.filter(c => c.id !== id);
            if (currentId === id) currentId = conversations[0].id;
            saveChats();
            renderSidebar();
            loadCurrentChat();
        }
        
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }
        
        // ====================== الاتصال بـ Gemini API ======================
        function showTyping() {
            const container = document.getElementById('messagesContainer');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'message';
            typingDiv.innerHTML = `<div class="avatar"><i class="fab fa-google"></i></div><div class="typing-indicator"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span><span style="margin-right:6px;">Gemini يكتب...</span></div>`;
            container.appendChild(typingDiv);
            scrollToBottom();
        }
        
        function hideTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }
        
        async function sendToGemini(messages) {
            const geminiMessages = [];
            for (const msg of messages) {
                if (msg.role === 'user' || msg.role === 'model') {
                    geminiMessages.push({
                        role: msg.role === 'user' ? 'user' : 'model',
                        parts: [{ text: msg.content }]
                    });
                }
            }
            
            // استخدام v1beta و gemini-1.5-flash (متوافق مع جميع المفاتيح المجانية)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_API_KEY}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: geminiMessages,
                    generationConfig: {
                        temperature: 0.7,
                        maxOutputTokens: 800,
                        topP: 0.9
                    }
                })
            });
            
            if (!response.ok) {
                const errorData = await response.json().catch(() => ({}));
                throw new Error(errorData.error?.message || `خطأ ${response.status}`);
            }
            
            const data = await response.json();
            const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (!reply) throw new Error("لم يتم الحصول على رد");
            return reply;
        }
        
        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            input.style.height = 'auto';
            
            addMessage('user', text);
            
            const conv = conversations.find(c => c.id === currentId);
            const context = conv.messages.slice(-15).map(m => ({ role: m.role, content: m.content }));
            
            isLoading = true;
            showTyping();
            
            try {
                const reply = await sendToGemini(context);
                hideTyping();
                addMessage('model', reply);
            } catch (error) {
                hideTyping();
                console.error(error);
                
                let errorMsg = `⚠️ خطأ: ${error.message}`;
                
                if (error.message.includes("API key") || error.message.includes("key") || error.message.includes("quota")) {
                    errorMsg = "❌ مفتاح API غير صالح أو منتهي.\n\n🔑 الرجاء الحصول على مفتاح جديد مجاني من:\nhttps://aistudio.google.com/app/apikey\n\nثم استبدله في السطر const GEMINI_API_KEY داخل الكود.";
                } else if (error.message.includes("not found")) {
                    errorMsg = "❌ مشكلة في النموذج. الرجاء تحديث الصفحة والمحاولة مرة أخرى.";
                }
                
                addMessage('model', errorMsg);
            } finally {
                isLoading = false;
            }
        }
        
        // ====================== الأحداث ======================
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('newChatBtn').addEventListener('click', newChat);
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });
        
        const textarea = document.getElementById('userInput');
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        loadChats();
    </script>
</body>
</html>
