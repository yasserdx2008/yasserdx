<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dx Station – محمل وسائط حقيقي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #0b0e1a, #03050b);
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.15), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.1), transparent),
                radial-gradient(2px 2px at 80% 20%, rgba(255,255,255,0.2), transparent);
            background-size: 200% 200%;
            animation: starDrift 30s linear infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes starDrift {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .dx-card {
            position: relative;
            z-index: 10;
            max-width: 780px;
            width: 100%;
            background: rgba(18, 22, 40, 0.65);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 3.5rem;
            padding: 2.8rem 2.2rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            animation: floatIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(40px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            justify-content: center;
        }

        .brand i {
            font-size: 2.8rem;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseGlow 2.8s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 8px rgba(79,172,254,0.3)); }
            100% { filter: drop-shadow(0 0 22px rgba(245,87,108,0.7)); }
        }

        .brand h1 {
            font-size: 2.3rem;
            font-weight: 700;
            background: linear-gradient(to right, #f6d5f7, #fbe9d7, #b8e1fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand h1 span {
            font-weight: 300;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.9rem;
        }

        .subhead {
            text-align: center;
            color: rgba(220,220,255,0.7);
            margin-bottom: 2rem;
            font-weight: 300;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255,255,255,0.06);
            padding-bottom: 0.9rem;
        }

        .field-group {
            margin-bottom: 1.5rem;
        }

        .field-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #b8b0e0;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .field-label i { color: #7a6bcf; }

        .url-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(10,14,30,0.7);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.25s;
            padding: 0.1rem 0.1rem 0.1rem 1.5rem;
        }

        .url-input-wrapper:focus-within {
            border-color: #8b6bf0;
            box-shadow: 0 0 0 4px rgba(139,107,240,0.25);
        }

        .url-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.5rem 1rem 0;
            color: #f0eeff;
            font-size: 1rem;
            outline: none;
            direction: ltr;
        }

        .url-input-wrapper input::placeholder {
            color: rgba(200,195,230,0.35);
        }

        .url-input-wrapper .icon-btn {
            background: linear-gradient(145deg, #3e2f6b, #291e4a);
            color: #cbb5ff;
            border: none;
            width: 3.2rem;
            height: 3.2rem;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .url-input-wrapper .icon-btn:hover {
            background: linear-gradient(145deg, #6a4fc9, #4a2f8a);
            color: #fff;
            transform: scale(1.02);
        }

        .row-duo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 500px) {
            .row-duo { grid-template-columns: 1fr; }
        }

        .select-box {
            background: rgba(10,14,30,0.6);
            border-radius: 30px;
            padding: 0.2rem 0.2rem 0.2rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            transition: 0.25s;
        }

        .select-box:focus-within {
            border-color: #7b62d9;
            box-shadow: 0 0 0 3px rgba(123,98,217,0.25);
        }

        .select-box i { color: #9280d9; margin-left: 0.3rem; }

        .select-box select {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.9rem 0.2rem;
            color: #eceaff;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .select-box select option {
            background: #1a1e32;
            color: #eee;
        }

        .select-box .select-icon {
            padding-left: 1rem;
            color: #5b4b8a;
        }

        .toggle-group {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .toggle-item {
            flex: 1;
            min-width: 100px;
        }

        .toggle-item input { display: none; }

        .toggle-item label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            background: rgba(15,20,40,0.5);
            padding: 0.9rem 0.5rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.04);
            color: #9a94b8;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.25s;
        }

        .toggle-item input:checked+label {
            background: linear-gradient(145deg, #372e6b, #231b4a);
            border-color: #896eda;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(100,70,200,0.3);
            transform: scale(1.02);
        }

        .btn-download {
            width: 100%;
            background: linear-gradient(135deg, #6c4fcd, #9f6ef0, #f093fb);
            background-size: 200% 200%;
            border: none;
            padding: 1.2rem;
            border-radius: 80px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 28px rgba(100,60,200,0.35);
            animation: gradientShift 4s ease infinite alternate;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .btn-download:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 14px 40px rgba(120,70,255,0.5);
        }

        .btn-download:active { transform: scale(0.96); }

        .result-area {
            margin-top: 1.8rem;
            padding: 1rem;
            min-height: 80px;
            border-radius: 30px;
            background: rgba(0,0,0,0.15);
            backdrop-filter: blur(8px);
            border: 1px dashed rgba(255,255,255,0.03);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b1a8d9;
            font-size: 0.95rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .result-area .preview {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        .result-area .preview img {
            max-width: 100px;
            border-radius: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .result-area .info { text-align: right; }

        .result-area .info strong {
            color: #e6ddff;
            display: block;
            font-size: 1rem;
        }

        .result-area .info small {
            color: #9588b8;
            font-size: 0.8rem;
        }

        .error-msg {
            color: #f6798b;
            background: rgba(220,60,90,0.12);
            padding: 0.6rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255,90,120,0.15);
        }

        .download-link {
            display: inline-block;
            background: #2d2255;
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid #5b45a0;
        }

        .download-link:hover {
            background: #4a3580;
            transform: scale(1.05);
        }

        .spinner {
            display: inline-block;
            width: 1.4rem;
            height: 1.4rem;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #b49aff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .legal-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: rgba(180,170,210,0.25);
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.03);
            padding-top: 1.2rem;
        }

        .legal-note i { margin-left: 0.3rem; color: #4d3f7a; }
        
        .success {
            color: #5fdf8f;
        }
    </style>
</head>
<body>
    <div class="dx-card">
        <div class="brand">
            <i class="fas fa-bolt"></i>
            <h1>Dx <span>Station</span></h1>
            <i class="fas fa-download" style="font-size:1.6rem; -webkit-text-fill-color:initial; color:#6a5aa0;"></i>
        </div>
        <div class="subhead">
            <i class="fas fa-link" style="margin-left:0.5rem; opacity:0.5;"></i> 
            ألصق الرابط، اختر المنصة، وحدد الجودة
        </div>

        <div class="field-group">
            <div class="field-label">
                <i class="fas fa-paste"></i> رابط الفيديو
            </div>
            <div class="url-input-wrapper">
                <input type="text" id="videoUrl" placeholder="https://www.youtube.com/... أو https://www.tiktok.com/..." value="https://www.youtube.com/watch?v=dQw4w9WgXcQ" />
                <button class="icon-btn" id="pasteBtn" title="لصق"><i class="fas fa-paste"></i></button>
            </div>
        </div>

        <div class="row-duo">
            <div class="select-box">
                <i class="fas fa-globe"></i>
                <select id="platformSelect">
                    <option value="youtube">YouTube</option>
                    <option value="instagram">Instagram</option>
                    <option value="tiktok">TikTok</option>
                </select>
                <span class="select-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
            <div class="select-box">
                <i class="fas fa-sliders-h"></i>
                <select id="qualitySelect">
                    <option value="1080">1080p (Full HD)</option>
                    <option value="720" selected>720p (HD)</option>
                    <option value="480">480p (SD)</option>
                    <option value="360">360p (Low)</option>
                    <option value="audio">🎵 صوت MP3</option>
                </select>
                <span class="select-icon"><i class="fas fa-chevron-down"></i></span>
            </div>
        </div>

        <div class="toggle-group">
            <div class="toggle-item">
                <input type="radio" name="formatType" id="mp4Toggle" value="mp4" checked />
                <label for="mp4Toggle"><i class="fas fa-film"></i> MP4 (فيديو)</label>
            </div>
            <div class="toggle-item">
                <input type="radio" name="formatType" id="mp3Toggle" value="mp3" />
                <label for="mp3Toggle"><i class="fas fa-music"></i> MP3 (صوت)</label>
            </div>
        </div>

        <button class="btn-download" id="downloadBtn">
            <i class="fas fa-cloud-download-alt"></i> تحميل الآن
        </button>

        <div class="result-area" id="resultArea">
            <span style="opacity:0.5;"><i class="fas fa-info-circle"></i> انتظر معاينة الفيديو</span>
        </div>

        <div class="legal-note">
            <i class="fas fa-exclamation-triangle"></i> للأغراض التعليمية فقط – استخدم APIs خارجية للتحميل.
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            const urlInput = document.getElementById('videoUrl');
            const platformSelect = document.getElementById('platformSelect');
            const qualitySelect = document.getElementById('qualitySelect');
            const formatRadios = document.querySelectorAll('input[name="formatType"]');
            const downloadBtn = document.getElementById('downloadBtn');
            const resultArea = document.getElementById('resultArea');
            const pasteBtn = document.getElementById('pasteBtn');

            pasteBtn.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    if (text) urlInput.value = text;
                } catch (_) {
                    urlInput.focus();
                    document.execCommand('paste');
                }
            });

            function getSelectedFormat() {
                for (const radio of formatRadios) {
                    if (radio.checked) return radio.value;
                }
                return 'mp4';
            }

            function setResult(content, isError = false) {
                if (isError) {
                    resultArea.innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-circle"></i> ${content}</div>`;
                } else {
                    resultArea.innerHTML = content;
                }
            }

            function setLoading() {
                setResult(`
                    <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap; justify-content:center;">
                        <span class="spinner"></span>
                        <span style="color:#c9beff;">جاري جلب معلومات الفيديو...</span>
                    </div>
                `);
            }

            // ===== استخراج معرف الفيديو =====
            function extractVideoId(url, platform) {
                try {
                    if (platform === 'youtube') {
                        const urlObj = new URL(url);
                        if (urlObj.hostname.includes('youtu.be')) {
                            return urlObj.pathname.slice(1);
                        }
                        return urlObj.searchParams.get('v');
                    } else if (platform === 'tiktok') {
                        const match = url.match(/\/video\/(\d+)/);
                        return match ? match[1] : null;
                    } else if (platform === 'instagram') {
                        const match = url.match(/\/p\/([A-Za-z0-9_-]+)/);
                        return match ? match[1] : null;
                    }
                } catch (_) { return null; }
                return null;
            }

            // ===== الحصول على رابط التحميل من API =====
            async function getDownloadUrl(url, platform, quality, format) {
                const videoId = extractVideoId(url, platform);
                if (!videoId) {
                    throw new Error('لم نتمكن من استخراج معرف الفيديو. تأكد من الرابط.');
                }

                let apiUrl = '';
                let response;

                if (platform === 'youtube') {
                    // استخدام API من ytdlapi.com
                    const qualityMap = {
                        '1080': '1080',
                        '720': '720',
                        '480': '480',
                        '360': '360',
                        'audio': 'mp3'
                    };
                    const q = qualityMap[quality] || '720';
                    apiUrl = `https://api.vevioz.com/api/button/${q}/${videoId}`;
                    
                    response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    if (data && data.download) {
                        return data.download;
                    } else {
                        throw new Error('لم نجد رابط تحميل. حاول مرة أخرى.');
                    }
                } 
                else if (platform === 'tiktok') {
                    // استخدام TikMate API
                    apiUrl = `https://tikmate.cc/api/url/${videoId}`;
                    response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    if (data && data.url) {
                        return data.url;
                    } else {
                        throw new Error('لم نجد رابط تحميل لتيك توك.');
                    }
                }
                else if (platform === 'instagram') {
                    // استخدام SnapInsta API
                    apiUrl = `https://snapinsta.app/api/action?url=${encodeURIComponent(url)}`;
                    response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    if (data && data.download) {
                        return data.download;
                    } else {
                        throw new Error('لم نجد رابط تحميل لإنستغرام.');
                    }
                }

                throw new Error('منصة غير مدعومة أو API غير متاح.');
            }

            // ===== زر التحميل =====
            downloadBtn.addEventListener('click', async function(e) {
                e.preventDefault();

                const url = urlInput.value.trim();
                if (!url) {
                    setResult('⚠️ الرجاء إدخال رابط الفيديو', true);
                    return;
                }

                const platform = platformSelect.value;
                const quality = qualitySelect.value;
                const format = getSelectedFormat();

                let finalQuality = quality;
                let finalFormat = format;

                if (quality === 'audio' || finalFormat === 'mp3') {
                    finalFormat = 'mp3';
                    finalQuality = 'audio';
                } else {
                    finalFormat = 'mp4';
                }

                setLoading();

                try {
                    const downloadUrl = await getDownloadUrl(url, platform, finalQuality, finalFormat);
                    
                    const title = `فيديو من ${platform.charAt(0).toUpperCase() + platform.slice(1)}`;
                    const qualityDisplay = finalQuality === 'audio' ? 'صوت MP3' : `${finalQuality}p`;
                    
                    setResult(`
                        <div class="preview">
                            <img src="https://picsum.photos/seed/${Date.now()}/100/100" alt="معاينة" />
                            <div class="info">
                                <strong><i class="fas fa-check-circle" style="color:#5fdf8f; margin-left:0.4rem;"></i> ${title}</strong>
                                <small>
                                    <i class="fas fa-${platform === 'youtube' ? 'play' : platform === 'instagram' ? 'camera' : 'music'}"></i>
                                    ${platform.charAt(0).toUpperCase() + platform.slice(1)} 
                                    | ${qualityDisplay} 
                                    | ${finalFormat.toUpperCase()}
                                </small>
                                <div style="margin-top:0.6rem;">
                                    <a href="${downloadUrl}" target="_blank" class="download-link" download>
                                        <i class="fas fa-download"></i> تحميل ${finalFormat.toUpperCase()}
                                    </a>
                                </div>
                            </div>
                        </div>
                    `);
                } catch (error) {
                    setResult(`⚠️ ${error.message}`, true);
                }
            });

            // ===== التبديل التلقائي بين الصيغ =====
            qualitySelect.addEventListener('change', function() {
                if (this.value === 'audio') {
                    document.getElementById('mp3Toggle').checked = true;
                } else {
                    const format = getSelectedFormat();
                    if (format !== 'mp3') {
                        document.getElementById('mp4Toggle').checked = true;
                    }
                }
            });

            formatRadios.forEach(radio => {
                radio.addEventListener('change', function() {
                    if (this.value === 'mp3') {
                        if (qualitySelect.value !== 'audio') {
                            qualitySelect.value = 'audio';
                            resultArea.innerHTML = `<span style="opacity:0.5;"><i class="fas fa-info-circle"></i> تم ضبط الجودة إلى "صوت MP3"</span>`;
                        }
                    } else {
                        if (qualitySelect.value === 'audio') {
                            qualitySelect.value = '720';
                            resultArea.innerHTML = `<span style="opacity:0.5;"><i class="fas fa-info-circle"></i> تم ضبط الجودة إلى 720p</span>`;
                        }
                    }
                });
            });

            setTimeout(() => {
                resultArea.innerHTML = `<span style="opacity:0.4;"><i class="fas fa-arrow-left" style="margin-left:0.5rem;"></i> ألصق الرابط واضغط تحميل</span>`;
            }, 300);
        })();
    </script>
</body>
</html>
