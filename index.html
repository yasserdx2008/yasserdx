<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #131314; color: #e3e3e3; }
        .glass { background: rgba(30, 31, 32, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .typing-dot { width: 6px; height: 6px; background: #8e8e8e; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-white/10 flex justify-between items-center glass z-10">
        <h1 class="text-xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent animate__animated animate__fadeInRight">Gemini AI</h1>
        <button onclick="clearChat()" class="text-xs text-gray-400 hover:text-red-400 transition-colors">مسح المحادثة</button>
    </header>

    <!-- Chat Area -->
    <main id="chatContainer" class="flex-1 overflow-y-auto p-4 space-y-6 chat-container scroll-smooth">
        <div class="text-center mt-20 animate__animated animate__fadeIn">
            <div class="bg-white/5 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h2 class="text-2xl font-semibold">كيف يمكنني مساعدتك اليوم؟</h2>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-4 pb-8 glass">
        <div class="max-w-4xl mx-auto relative">
            <div id="typingIndicator" class="hidden absolute -top-8 right-2 flex space-x-1 space-x-reverse">
                <div class="typing-dot" style="animation-delay: -0.32s"></div>
                <div class="typing-dot" style="animation-delay: -0.16s"></div>
                <div class="typing-dot"></div>
            </div>
            <div class="relative flex items-center">
                <input type="text" id="userInput" placeholder="اسأل Gemini..." 
                    class="w-full bg-[#282a2d] border border-transparent focus:border-blue-500 rounded-2xl py-4 pr-6 pl-14 outline-none transition-all shadow-2xl">
                <button onclick="sendMessage()" class="absolute left-3 p-2 bg-white rounded-xl hover:bg-gray-200 transition-transform active:scale-90">
                    <svg class="w-6 h-6 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                </button>
            </div>
            <p class="text-[10px] text-center mt-3 text-gray-500">يعمل بواسطة Google Gemini API - يتم الحفظ محلياً</p>
        </div>
    </footer>

    <script>
        // --- الإعدادات ---
        const API_KEY = 'AIzaSyAYbcg-C7bhAInQRVi4AannO-SRCoMhi9w'; 
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // تحميل المحادثات المحفوظة من الهاتف
        let history = JSON.parse(localStorage.getItem('chat_history')) || [];
        if(history.length > 0) renderHistory();

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            showTyping(true);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                appendMessage('ai', aiResponse);
                saveChat('ai', aiResponse);
            } catch (error) {
                appendMessage('ai', 'عذراً، حدث خطأ في الاتصال. تأكد من مفتاح API.');
            } finally {
                showTyping(false);
            }
        }

        function appendMessage(role, text) {
            const isUser = role === 'user';
            const msgHtml = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate__animated ${isUser ? 'animate__fadeInLeft' : 'animate__fadeInRight'}">
                    <div class="max-w-[85%] p-4 rounded-2xl ${isUser ? 'bg-blue-600 text-white rounded-br-none' : 'bg-[#282a2d] text-gray-200 rounded-bl-none border border-white/5'}">
                        <p class="text-sm leading-relaxed whitespace-pre-wrap">${text}</p>
                    </div>
                </div>`;
            
            if (history.length === 0 && isUser) chatContainer.innerHTML = ''; 
            chatContainer.insertAdjacentHTML('beforeend', msgHtml);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if(isUser) saveChat('user', text);
        }

        function saveChat(role, text) {
            history.push({ role, text });
            localStorage.setItem('chat_history', JSON.stringify(history));
        }

        function renderHistory() {
            chatContainer.innerHTML = '';
            history.forEach(msg => appendMessage(msg.role, msg.text));
        }

        function clearChat() {
            localStorage.removeItem('chat_history');
            history = [];
            location.reload();
        }

        function showTyping(show) {
            typingIndicator.classList.toggle('hidden', !show);
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
