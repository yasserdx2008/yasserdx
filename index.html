<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DX - QR Code Generator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 16px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px 22px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 900;
            color: #1a1a2e;
            box-shadow: 0 8px 24px rgba(255, 210, 0, 0.25);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .header .subtitle span {
            color: #ffd200;
            -webkit-text-fill-color: #ffd200;
        }

        .input-group {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 60px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: #ffd200;
            box-shadow: 0 0 20px rgba(255, 210, 0, 0.12);
        }

        .input-group input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 15px;
            outline: none;
            direction: ltr;
            min-width: 0;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-group button {
            padding: 12px 22px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .input-group button:active {
            transform: scale(0.95);
        }

        .qr-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 24px 0 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            min-height: 200px;
            justify-content: center;
            transition: all 0.4s ease;
        }

        .qr-display.has-qr {
            border-style: solid;
            border-color: rgba(255, 210, 0, 0.15);
            background: rgba(255, 210, 0, 0.03);
        }

        #qrcode {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        #qrcode canvas {
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            height: auto;
            width: auto !important;
            max-height: 300px;
            image-rendering: auto;
        }

        @media (max-width: 480px) {
            #qrcode canvas {
                max-height: 220px;
            }
        }

        #qrcode img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .qr-placeholder {
            color: rgba(255, 255, 255, 0.12);
            font-size: 13px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .qr-placeholder i {
            font-size: 44px;
            opacity: 0.3;
        }

        .link-preview {
            display: none;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 14px;
            border-radius: 14px;
            margin-top: 12px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            word-break: break-all;
            direction: ltr;
        }

        .link-preview.show {
            display: block;
            animation: fadeInUp 0.3s ease;
        }

        .link-preview span {
            color: #ffd200;
            font-weight: 500;
        }

        .quality-badge {
            display: inline-block;
            background: rgba(255, 210, 0, 0.08);
            border: 1px solid rgba(255, 210, 0, 0.12);
            border-radius: 20px;
            padding: 3px 14px;
            font-size: 10px;
            color: #ffd200;
            margin-top: 8px;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 4px;
        }

        .actions button {
            flex: 1;
            min-width: 70px;
            padding: 12px 10px;
            border: none;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            -webkit-tap-highlight-color: transparent;
        }

        .actions button:active {
            transform: scale(0.94);
        }

        .actions .btn-primary {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            border: none;
        }

        .actions .btn-share {
            background: rgba(0, 200, 150, 0.1);
            border-color: rgba(0, 200, 150, 0.12);
            color: #5cd6b0;
        }

        .actions .btn-hd {
            background: rgba(255, 100, 100, 0.1);
            border-color: rgba(255, 100, 100, 0.12);
            color: #ff8a8a;
        }

        .history-section {
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 16px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 12px;
            margin-bottom: 10px;
        }

        .history-header button {
            background: none;
            border: none;
            color: rgba(255, 80, 80, 0.4);
            cursor: pointer;
            font-size: 11px;
            transition: color 0.3s;
            padding: 4px 8px;
        }

        .history-header button:active {
            color: rgba(255, 80, 80, 0.8);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .history-list::-webkit-scrollbar {
            width: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .history-item:active {
            background: rgba(255, 255, 255, 0.08);
        }

        .history-item .url {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            direction: ltr;
            margin-left: 8px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
        }

        .history-item .date {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.15);
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            color: #fff;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            border-color: rgba(255, 210, 0, 0.25);
        }
        .toast.error {
            border-color: rgba(255, 80, 80, 0.25);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 18px 14px;
                border-radius: 24px;
            }
            .header .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
            .header h1 {
                font-size: 26px;
            }
            .input-group {
                flex-direction: column;
                background: transparent;
                padding: 0;
                border: none;
                gap: 8px;
            }
            .input-group input {
                background: rgba(255, 255, 255, 0.05);
                border-radius: 60px;
                padding: 14px 18px;
                border: 1px solid rgba(255, 255, 255, 0.06);
                font-size: 14px;
            }
            .input-group button {
                justify-content: center;
                padding: 14px;
                font-size: 14px;
            }
            .actions button {
                min-width: 55px;
                font-size: 10px;
                padding: 10px 6px;
            }
            .qr-display {
                padding: 12px;
                min-height: 160px;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 40px 38px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">DX</div>
                <h1>DX</h1>
            </div>
            <p class="subtitle">QR Code Generator <span>• عالي الجودة</span></p>
        </div>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="https://example.com" spellcheck="false" inputmode="url" />
            <button id="generateBtn">
                <i class="fas fa-wand-magic-sparkles"></i> إنشاء
            </button>
        </div>

        <div class="qr-display" id="qrDisplay">
            <div id="qrcode">
                <div class="qr-placeholder">
                    <i class="fas fa-qrcode"></i>
                    <span>سيظهر الكود هنا</span>
                </div>
            </div>
            <div class="quality-badge" id="qualityBadge">🔹 جودة عالية 1024×1024</div>
            <div class="link-preview" id="linkPreview">
                <i class="fas fa-link" style="margin-left:6px;opacity:0.3;"></i>
                <span id="linkText">https://example.com</span>
            </div>
        </div>

        <div class="actions">
            <button class="btn-primary" id="downloadPngBtn">
                <i class="fas fa-download"></i> PNG
            </button>
            <button class="btn-hd" id="downloadHDPngBtn">
                <i class="fas fa-image"></i> HD
            </button>
            <button id="shareBtn" class="btn-share">
                <i class="fas fa-share-alt"></i> مشاركة
            </button>
            <button id="copyBtn">
                <i class="fas fa-copy"></i> نسخ
            </button>
            <button id="clearBtn" style="color:rgba(255,80,80,0.3);">
                <i class="fas fa-trash-can"></i>
            </button>
        </div>

        <div class="history-section">
            <div class="history-header">
                <span><i class="far fa-clock" style="margin-left:5px;"></i> السجل</span>
                <button id="clearHistoryBtn"><i class="fas fa-trash-alt"></i> مسح الكل</button>
            </div>
            <div class="history-list" id="historyList">
                <div style="color:rgba(255,255,255,0.08);font-size:12px;text-align:center;padding:10px;">
                    لا يوجد روابط محفوظة
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            'use strict';

            // ===== العناصر =====
            const urlInput = document.getElementById('urlInput');
            const generateBtn = document.getElementById('generateBtn');
            const qrContainer = document.getElementById('qrcode');
            const qrDisplay = document.getElementById('qrDisplay');
            const linkPreview = document.getElementById('linkPreview');
            const linkText = document.getElementById('linkText');
            const downloadPngBtn = document.getElementById('downloadPngBtn');
            const downloadHDPngBtn = document.getElementById('downloadHDPngBtn');
            const shareBtn = document.getElementById('shareBtn');
            const copyBtn = document.getElementById('copyBtn');
            const clearBtn = document.getElementById('clearBtn');
            const historyList = document.getElementById('historyList');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');
            const toast = document.getElementById('toast');
            const qualityBadge = document.getElementById('qualityBadge');

            let currentUrl = '';
            let currentCanvas = null;
            let history = [];

            // ===== إعدادات الجودة =====
            const QR_SIZE = 1024;

            // ===== IndexedDB =====
            const DB_NAME = 'DX_QR_History';
            const STORE_NAME = 'history';
            let db = null;

            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, 1);
                    request.onupgradeneeded = function(e) {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            const store = db.createObjectStore(STORE_NAME, { keyPath: 'id',
                            autoIncrement: true });
                            store.createIndex('url', 'url', { unique: false });
                            store.createIndex('date', 'date', { unique: false });
                        }
                    };
                    request.onsuccess = function(e) {
                        db = e.target.result;
                        resolve(db);
                    };
                    request.onerror = function(e) {
                        reject(e.target.error);
                    };
                });
            }

            function saveHistoryToDB(historyArray) {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const clearReq = store.clear();
                    clearReq.onsuccess = function() {
                        let count = 0;
                        if (historyArray.length === 0) { resolve(); return; }
                        historyArray.forEach((item) => {
                            const addReq = store.add(item);
                            addReq.onsuccess = function() {
                                count++;
                                if (count === historyArray.length) resolve();
                            };
                            addReq.onerror = function(e) {
                                reject(e.target.error);
                            };
                        });
                    };
                    clearReq.onerror = function(e) {
                        reject(e.target.error);
                    };
                });
            }

            function loadHistoryFromDB() {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = function() {
                        const data = request.result || [];
                        data.sort((a, b) => new Date(b.date) - new Date(a.date));
                        resolve(data);
                    };
                    request.onerror = function(e) {
                        reject(e.target.error);
                    };
                });
            }

            function deleteHistoryFromDB() {
                return new Promise((resolve, reject) => {
                    if (!db) { reject('DB not open'); return; }
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const req = store.clear();
                    req.onsuccess = function() { resolve(); };
                    req.onerror = function(e) { reject(e.target.error); };
                });
            }

            async function initDB() {
                try {
                    await openDB();
                    const data = await loadHistoryFromDB();
                    history = data;
                    renderHistory();
                } catch (e) {
                    console.warn('IndexedDB غير متاح، نستخدم LocalStorage', e);
                    loadHistoryFromLocal();
                }
            }

            function loadHistoryFromLocal() {
                try {
                    const stored = localStorage.getItem('dx_qr_history');
                    if (stored) {
                        history = JSON.parse(stored);
                        if (!Array.isArray(history)) history = [];
                    }
                } catch (_) { history = []; }
                renderHistory();
            }

            async function saveHistory() {
                try {
                    if (db) {
                        await saveHistoryToDB(history);
                    } else {
                        localStorage.setItem('dx_qr_history', JSON.stringify(history));
                    }
                } catch (e) {
                    localStorage.setItem('dx_qr_history', JSON.stringify(history));
                }
                renderHistory();
            }

            async function addToHistory(url) {
                if (!url || url.trim() === '') return;
                history = history.filter(item => item.url !== url);
                history.unshift({
                    url: url,
                    date: new Date().toISOString()
                });
                if (history.length > 30) history.pop();
                await saveHistory();
            }

            function renderHistory() {
                if (!history || history.length === 0) {
                    historyList.innerHTML =
                        `<div style="color:rgba(255,255,255,0.08);font-size:12px;text-align:center;padding:10px;">لا يوجد روابط محفوظة</div>`;
                    return;
                }
                let html = '';
                history.forEach((item) => {
                    const displayDate = item.date ? new Date(item.date).toLocaleString('ar-EG', { hour12: false }) :
                        '';
                    html += `
                            <div class="history-item" data-url="${encodeURIComponent(item.url)}">
                                <span class="url">${item.url}</span>
                                <span class="date">${displayDate}</span>
                            </div>
                        `;
                });
                historyList.innerHTML = html;
                document.querySelectorAll('.history-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const url = decodeURIComponent(this.dataset.url);
                        urlInput.value = url;
                        generateQR(url);
                    });
                });
            }

            async function clearHistory() {
                if (!history || history.length === 0) return;
                history = [];
                try {
                    if (db) {
                        await deleteHistoryFromDB();
                    } else {
                        localStorage.removeItem('dx_qr_history');
                    }
                } catch (_) { localStorage.removeItem('dx_qr_history'); }
                renderHistory();
                showToast('🗑️ تم مسح السجل', 'success');
            }

            // ===== إنشاء QR =====
            function generateQR(url) {
                if (!url || url.trim() === '') {
                    showToast('⚠️ الرجاء إدخال رابط', 'error');
                    return;
                }

                let finalUrl = url.trim();
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                    finalUrl = 'https://' + finalUrl;
                }

                currentUrl = finalUrl;

                qrContainer.innerHTML = '';
                qrDisplay.classList.add('has-qr');

                new QRCode(qrContainer, {
                    text: finalUrl,
                    width: QR_SIZE,
                    height: QR_SIZE,
                    colorDark: '#ffffff',
                    colorLight: 'transparent',
                    correctLevel: QRCode.CorrectLevel.H
                });

                linkText.textContent = finalUrl;
                linkPreview.classList.add('show');

                setTimeout(() => {
                    const canvas = qrContainer.querySelector('canvas');
                    if (canvas) {
                        canvas.style.maxWidth = '100%';
                        canvas.style.height = 'auto';
                        currentCanvas = canvas;
                        qualityBadge.textContent = '🔹 جودة عالية ' + QR_SIZE + '×' + QR_SIZE;
                    }
                }, 200);

                addToHistory(finalUrl);
                showToast('✅ تم إنشاء QR عالي الجودة', 'success');
            }

            // ===== تحميل HD (1024×1024) =====
            function downloadHD() {
                let canvas = qrContainer.querySelector('canvas');
                if (!canvas) {
                    setTimeout(() => {
                        canvas = qrContainer.querySelector('canvas');
                        if (canvas) {
                            performDownloadHD(canvas);
                        } else {
                            showToast('⚠️ انتظر حتى يظهر الـ QR', 'error');
                        }
                    }, 300);
                    return;
                }
                performDownloadHD(canvas);
            }

            function performDownloadHD(canvas) {
                try {
                    if (canvas.toBlob) {
                        canvas.toBlob(function(blob) {
                            if (!blob) {
                                fallbackDownload(canvas, 'HD');
                                return;
                            }
                            const link = document.createElement('a');
                            link.download = `DX_QR_HD_${Date.now()}.png`;
                            link.href = URL.createObjectURL(blob);
                            document.body.appendChild(link);
                            link.click();
                            setTimeout(() => {
                                document.body.removeChild(link);
                                URL.revokeObjectURL(link.href);
                            }, 100);
                            showToast('✅ تم تحميل HD', 'success');
                        }, 'image/png', 1.0);
                    } else {
                        fallbackDownload(canvas, 'HD');
                    }
                } catch (error) {
                    fallbackDownload(canvas, 'HD');
                }
            }

            // ===== تحميل PNG عادي =====
            function downloadPNG() {
                let canvas = qrContainer.querySelector('canvas');
                if (!canvas) {
                    setTimeout(() => {
                        canvas = qrContainer.querySelector('canvas');
                        if (canvas) {
                            performDownloadPNG(canvas);
                        } else {
                            showToast('⚠️ انتظر حتى يظهر الـ QR', 'error');
                        }
                    }, 300);
                    return;
                }
                performDownloadPNG(canvas);
            }

            function performDownloadPNG(canvas) {
                try {
                    const tempCanvas = document.createElement('canvas');
                    const size = 512;
                    tempCanvas.width = size;
                    tempCanvas.height = size;
                    const ctx = tempCanvas.getContext('2d');
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(canvas, 0, 0, size, size);

                    tempCanvas.toBlob(function(blob) {
                        if (!blob) {
                            fallbackDownload(tempCanvas, 'PNG');
                            return;
                        }
                        const link = document.createElement('a');
                        link.download = `DX_QR_${Date.now()}.png`;
                        link.href = URL.createObjectURL(blob);
                        document.body.appendChild(link);
                        link.click();
                        setTimeout(() => {
                            document.body.removeChild(link);
                            URL.revokeObjectURL(link.href);
                        }, 100);
                        showToast('✅ تم تحميل PNG', 'success');
                    }, 'image/png', 1.0);
                } catch (error) {
                    fallbackDownload(canvas, 'PNG');
                }
            }

            // ===== طريقة احتياطية للتحميل =====
            function fallbackDownload(canvas, type) {
                try {
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `DX_QR_${type}_${Date.now()}.png`;
                    link.href = dataUrl;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    setTimeout(() => {
                        link.click();
                        setTimeout(() => {
                            document.body.removeChild(link);
                        }, 200);
                    }, 50);
                    showToast(`✅ تم تحميل ${type}`, 'success');
                } catch (error) {
                    showToast('⚠️ فشل التحميل', 'error');
                }
            }

            // ===== مشاركة =====
            function shareQR() {
                let canvas = qrContainer.querySelector('canvas');
                if (!canvas) {
                    showToast('⚠️ انتظر حتى يظهر الـ QR', 'error');
                    return;
                }

                if (navigator.share) {
                    canvas.toBlob(function(blob) {
                        if (!blob) {
                            showToast('⚠️ لا يمكن مشاركة الصورة', 'error');
                            return;
                        }
                        const file = new File([blob], `DX_QR_${Date.now()}.png`, { type: 'image/png' });
                        navigator.share({
                            title: 'DX QR Code',
                            text: currentUrl || 'QR Code',
                            files: [file]
                        }).catch(() => {});
                    }, 'image/png');
                } else {
                    downloadPNG();
                }
            }

            // ===== نسخ =====
            function copyLink() {
                if (!currentUrl) {
                    showToast('⚠️ لا يوجد رابط لنسخه', 'error');
                    return;
                }
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(currentUrl).then(() => {
                        showToast('📋 تم نسخ الرابط', 'success');
                    }).catch(() => {
                        fallbackCopy();
                    });
                } else {
                    fallbackCopy();
                }
            }

            function fallbackCopy() {
                const textArea = document.createElement('textarea');
                textArea.value = currentUrl;
                textArea.style.position = 'fixed';
                textArea.style.opacity = '0';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('📋 تم نسخ الرابط', 'success');
                } catch (_) {
                    showToast('⚠️ لم يتم النسخ', 'error');
                }
                document.body.removeChild(textArea);
            }

            // ===== مسح =====
            function clearAll() {
                urlInput.value = '';
                qrContainer.innerHTML = `<div class="qr-placeholder">
                            <i class="fas fa-qrcode"></i>
                            <span>سيظهر الكود هنا</span>
                        </div>`;
                qrDisplay.classList.remove('has-qr');
                linkPreview.classList.remove('show');
                currentUrl = '';
                currentCanvas = null;
                qualityBadge.textContent = '🔹 جودة عالية 1024×1024';
                showToast('🗑️ تم المسح', 'success');
            }

            // ===== إشعار =====
            let toastTimer = null;

            function showToast(message, type = 'success') {
                toast.textContent = message;
                toast.className = 'toast ' + type;
                void toast.offsetWidth;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ===== أحداث =====
            generateBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const url = urlInput.value.trim();
                if (url) generateQR(url);
                else showToast('⚠️ الرجاء إدخال رابط', 'error');
            });

            urlInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    generateBtn.click();
                }
            });

            downloadPngBtn.addEventListener('click', downloadPNG);
            downloadHDPngBtn.addEventListener('click', downloadHD);
            shareBtn.addEventListener('click', shareQR);
            copyBtn.addEventListener('click', copyLink);
            clearBtn.addEventListener('click', clearAll);
            clearHistoryBtn.addEventListener('click', clearHistory);

            // ===== تهيئة =====
            initDB().then(() => {
                console.log('🚀 DX QR Generator جاهز!');
                console.log('📱 جودة عالية ' + QR_SIZE + '×' + QR_SIZE);
            }).catch(() => {
                loadHistoryFromLocal();
                console.log('🔄 تم استخدام LocalStorage');
            });

            // ===== رابط تلقائي =====
            const params = new URLSearchParams(window.location.search);
            const initialUrl = params.get('url');
            if (initialUrl) {
                urlInput.value = initialUrl;
                setTimeout(() => {
                    generateQR(initialUrl);
                }, 400);
            }

            console.log('✅ DX - النسخة النهائية جاهزة!');
        })();
    </script>

</body>
</html>
