<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama 3 Professional Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f19; color: #f1f5f9; }
        .user-bubble { background: #2563eb; border-radius: 18px 18px 2px 18px; }
        .ai-bubble { background: #1e293b; border: 1px solid #334155; border-radius: 18px 18px 18px 2px; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-[#0b0f19]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
            <h1 class="font-bold text-lg tracking-tight">Llama 3 <span class="text-blue-500">AI</span></h1>
        </div>
        <button onclick="clearChat()" class="text-[10px] text-gray-500 hover:text-red-400">مسح المحادثة</button>
    </header>

    <!-- Chat Box -->
    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-32 space-y-6 pt-6 chat-container">
        <div id="welcome" class="text-center py-20 animate__animated animate__fadeIn">
            <div class="w-20 h-20 bg-blue-600/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-blue-500/20">
                <svg class="w-10 h-10 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold">مرحباً بك!</h2>
            <p class="text-slate-500 mt-2">اسأل أي سؤال وسيقوم Llama 3 بالرد عليك.</p>
        </div>
    </main>

    <!-- Input -->
    <footer class="p-4 md:p-10">
        <div class="max-w-4xl mx-auto relative">
            <div id="status" class="hidden absolute -top-7 right-2 flex items-center gap-2 text-blue-400 text-[10px] font-bold">
                <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-ping"></div> جاري التفكير...
            </div>
            
            <div class="flex items-center px-4 py-2 bg-[#1e293b] border border-slate-700 rounded-2xl shadow-2xl transition-all focus-within:border-blue-500/50">
                <input type="text" id="userInput" placeholder="اكتب رسالتك هنا..." 
                    class="flex-1 bg-transparent border-none outline-none py-3 text-sm text-white">
                <button onclick="handleSend()" class="p-2.5 bg-blue-600 rounded-xl hover:bg-blue-500 transition-all active:scale-90">
                    <svg class="w-5 h-5 text-white transform rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        // التوكين الخاص بك تم وضعه هنا
        const TOKEN = "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";
        
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const status = document.getElementById('status');

        let chatHistory = JSON.parse(localStorage.getItem('hf_chat')) || [];
        if(chatHistory.length > 0) { if(document.getElementById('welcome')) document.getElementById('welcome').remove(); renderHistory(); }

        async function handleSend() {
            const prompt = userInput.value.trim();
            if(!prompt) return;

            if(document.getElementById('welcome')) document.getElementById('welcome').remove();

            addMsg('user', prompt);
            userInput.value = '';
            status.classList.remove('hidden');

            try {
                // استخدام موديل Llama 3 القوي عبر Hugging Face
                const response = await fetch("https://api-inference.huggingface.co/models/meta-llama/Meta-Llama-3-8B-Instruct", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        inputs: `<|begin_of_text|><|start_header_id|>user<|end_header_id|>\n\n${prompt}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`,
                        parameters: { max_new_tokens: 1000, return_full_text: false }
                    })
                });

                const data = await response.json();
                
                // استخراج النص من مصفوفة الرد
                let aiText = data[0]?.generated_text || data.generated_text || "حدث خطأ في معالجة الرد.";
                
                // تنظيف الرد من أي علامات تقنية زائدة
                aiText = aiText.replace(/<\|.*?\|>/g, "").trim();

                addMsg('model', aiText);
                save(prompt, aiText);

            } catch (err) {
                addMsg('model', "تعذر الاتصال بـ Hugging Face. تأكد من جودة الإنترنت.");
            } finally {
                status.classList.add('hidden');
            }
        }

        function addMsg(role, content) {
            const isUser = role === 'user';
            const html = `
                <div class="flex ${isUser ? 'justify-end' : 'justify-start'} animate__animated animate__fadeInUp animate__faster">
                    <div class="max-w-[85%] p-4 ${isUser ? 'user-bubble' : 'ai-bubble'} shadow-lg">
                        ${!isUser ? '<div class="text-[10px] text-blue-400 font-bold mb-1">AI ASSISTANT</div>' : ''}
                        <p class="text-sm leading-relaxed whitespace-pre-wrap">${content}</p>
                    </div>
                </div>`;
            chatBox.insertAdjacentHTML('beforeend', html);
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }

        function save(u, a) {
            chatHistory.push({ u, a });
            localStorage.setItem('hf_chat', JSON.stringify(chatHistory));
        }

        function renderHistory() {
            chatHistory.forEach(m => { addMsg('user', m.u); addMsg('model', m.a); });
        }

        function clearChat() { localStorage.clear(); location.reload(); }
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
